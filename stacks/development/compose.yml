services:
  mysql:
    image: mysql:8.0
    container_name: dev_mysql
    restart: unless-stopped
    mac_address: "02:42:ac:28:00:02"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-as2025}
      MYSQL_USER: ${MYSQL_USER:-as2025}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      development_net:
        ipv4_address: 172.40.0.20
      services_net:
        ipv4_address: 172.20.0.20

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:

networks:
  development_net:
    external: true
  services_net:
    external: true
        